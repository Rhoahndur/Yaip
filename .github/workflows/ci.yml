name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Create CI config
        run: |
          cat > Yaip/Config.xcconfig <<'EOF'
          N8N_WEBHOOK_URL = https://placeholder.example.com/webhook
          N8N_AUTH_TOKEN = ci_placeholder_token
          GOOGLE_CLIENT_ID = placeholder.apps.googleusercontent.com
          GOOGLE_REVERSED_CLIENT_ID = com.googleusercontent.apps.placeholder
          EOF

      - name: Create dummy GoogleService-Info.plist
        run: |
          cat > Yaip/Yaip/GoogleService-Info.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>API_KEY</key>
              <string>ci_placeholder</string>
              <key>GCM_SENDER_ID</key>
              <string>000000000000</string>
              <key>PLIST_VERSION</key>
              <string>1</string>
              <key>BUNDLE_ID</key>
              <string>Tavern.Yaip</string>
              <key>PROJECT_ID</key>
              <string>ci-placeholder</string>
              <key>STORAGE_BUCKET</key>
              <string>ci-placeholder.appspot.com</string>
              <key>GOOGLE_APP_ID</key>
              <string>1:000000000000:ios:0000000000000000</string>
          </dict>
          </plist>
          EOF

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/Yaip-*/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('Yaip/Yaip.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project Yaip/Yaip.xcodeproj \
            -scheme Yaip \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color

      - name: Run Tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project Yaip/Yaip.xcodeproj \
            -scheme Yaip \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO \
            -enableCodeCoverage YES \
            | xcpretty --color

  lint:
    runs-on: macos-15
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: swiftlint lint --reporter github-actions-logging
