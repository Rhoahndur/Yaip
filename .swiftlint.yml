included:
  - Yaip/Yaip

excluded:
  - Yaip/Yaip/Assets.xcassets
  - Yaip/YaipTests

line_length:
  warning: 150
  error: 200

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 500
  error: 800

function_body_length:
  warning: 60
  error: 100

disabled_rules:
  - trailing_whitespace
  - todo
  - cyclomatic_complexity
  - nesting

opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_first_not_nil
  - force_unwrapping
  - implicitly_unwrapped_optional
  - overridden_super_call
  - redundant_nil_coalescing
  - vertical_whitespace_closing_braces

reporter: xcode
